kind = "web"
previewPath = "/"
title = "Insulin Dose Calculator"
version = "1.0.0"
id = "artifacts/insulin-calculator"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25193

[services.development]
run = "pnpm --filter @workspace/insulin-calculator run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/insulin-calculator", "run", "build" ]
publicDir = "artifacts/insulin-calculator/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25193"
BASE_PATH = "/"
